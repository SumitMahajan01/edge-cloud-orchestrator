apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: edge-cloud
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: edgecloud/orchestrator:latest
        ports:
        - containerPort: 5173
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          limits:
            memory: "512Mi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: edge-cloud
spec:
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 5173
  type: LoadBalancer
