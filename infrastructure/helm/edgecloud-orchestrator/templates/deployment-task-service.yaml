apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edgecloud.fullname" . }}-task-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edgecloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: task-service
spec:
  replicas: {{ .Values.taskService.replicaCount }}
  selector:
    matchLabels:
      {{- include "edgecloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: task-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "edgecloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: task-service
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "edgecloud.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: task-service
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.taskService.image.repository }}:{{ .Values.taskService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_HOST
              value: {{ .Values.database.host | default (printf "%s-cockroachdb.%s.svc.cluster.local" .Release.Name .Release.Namespace) }}
            - name: DATABASE_PORT
              value: "{{ .Values.database.port }}"
            - name: DATABASE_NAME
              value: "{{ .Values.database.name }}"
            - name: DATABASE_USER
              value: "{{ .Values.database.user }}"
            - name: KAFKA_BROKERS
              value: {{ .Values.kafkaConfig.brokers | default (printf "%s-kafka.%s.svc.cluster.local:9092" .Release.Name .Release.Namespace) }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.taskService.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
