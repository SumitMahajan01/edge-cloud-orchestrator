apiVersion: v1
kind: Service
metadata:
  name: {{ include "edgecloud.fullname" . }}-task-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edgecloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: task-service
spec:
  type: {{ .Values.taskService.service.type }}
  ports:
    - port: {{ .Values.taskService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "edgecloud.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: task-service
