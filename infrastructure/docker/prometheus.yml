global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'edge-agents'
    static_configs:
      - targets:
        - 'agent-1:4001'
        - 'agent-2:4001'
        - 'agent-3:4001'
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:5173']
    scrape_interval: 30s
