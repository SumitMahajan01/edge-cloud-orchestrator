global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'edge-cloud-backend'
    static_configs:
      - targets: ['backend:3000']

  - job_name: 'edge-agents'
    static_configs:
      - targets: ['edge-agent-1:4001', 'edge-agent-2:4002']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
