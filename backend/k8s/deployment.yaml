apiVersion: v1
kind: Namespace
metadata:
  name: edge-cloud-orchestrator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-cloud-config
  namespace: edge-cloud-orchestrator
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: edge-cloud-secrets
  namespace: edge-cloud-orchestrator
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/edge_cloud?schema=public"
  REDIS_URL: "redis://redis:6379"
  RABBITMQ_URL: "amqp://admin:admin@rabbitmq:5672"
  JWT_SECRET: "change-this-in-production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: edge-cloud-orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: edge-cloud-orchestrator/backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: edge-cloud-config
        - secretRef:
            name: edge-cloud-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: edge-cloud-orchestrator
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-agent
  namespace: edge-cloud-orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edge-agent
  template:
    metadata:
      labels:
        app: edge-agent
    spec:
      containers:
      - name: edge-agent
        image: edge-cloud-orchestrator/edge-agent:latest
        ports:
        - containerPort: 4001
        env:
        - name: ORCHESTRATOR_URL
          value: "http://backend:3000/api"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
---
apiVersion: v1
kind: Service
metadata:
  name: edge-agent
  namespace: edge-cloud-orchestrator
spec:
  selector:
    app: edge-agent
  ports:
  - port: 4001
    targetPort: 4001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: edge-cloud-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "edge_cloud"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: edge-cloud-orchestrator
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: edge-cloud-orchestrator
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: edge-cloud-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        args:
        - redis-server
        - --appendonly
        - "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: edge-cloud-orchestrator
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edge-cloud-ingress
  namespace: edge-cloud-orchestrator
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.edge-cloud.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: edge-cloud-orchestrator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
